﻿﻿<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Strict//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd">
<html>

	<head>
		<meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
		<title>Hello</title>
		<link type="text/css" rel="stylesheet" href="./renxi/default.css">
		<style type="text/css"></style>
		<script type="text/javascript" src="./renxi/jquery.min.js"></script>
		<script type="text/javascript" src="./renxi/jscex.min.js"></script>
		<script type="text/javascript" src="./renxi/jscex-parser.js"></script>
		<script type="text/javascript" src="./renxi/jscex-jit.js"></script>
		<script type="text/javascript" src="./renxi/jscex-builderbase.min.js"></script>
		<script type="text/javascript" src="./renxi/jscex-async.min.js"></script>
		<script type="text/javascript" src="./renxi/jscex-async-powerpack.min.js"></script>
		<script type="text/javascript" src="./renxi/functions.js" charset="utf-8"></script>
		<script type="text/javascript" src="./renxi/love.js" charset="utf-8"></script>
		<style type="text/css"></style>
		<script>
			window.onload = function() {
				// 移除了名字输入提示
			}
		</script>
	</head>

	<body>
		<audio autoplay="autoplay" loop="loop" controls>
	<source src="renxi.mp3" type="audio/mp3" /></audio>
		<div id="main">
			<div id="wrap">
				<div id="text">
					<div id="code">
						<font color="black" size="4"><b><i>
						<span class="say">特意为你做了这个小小的网页</span><br>
						<span class="say"> </span><br>
						<span class="say">只是想以一种认真的方式，跟你打个招呼</span><br>
						<span class="say"> </span><br>
						<span class="say"> 不用有任何压力，也不必急着回复</span><br>
						<span class="say"> </span><br>
						<span class="say">只是想让你知道，你很特别</span><br>
						<span class="say"> </span><br>
						<span class="say">遇到你，是我生命中最美好的事情</span><br>
						<span class="say"> </span><br>
						<span class="say">忍不住为你准备了这个小惊喜，独属于你的web希望你能喜欢</span><br>
						<span class="say"> </span><br>
						<span class="say">我们可以做朋友吗？</span><br>
						<span class="say"> </span><br>
						<span class="say"> -- From JiFeng--</span>
						</i></b>
						</font>
					</div>
				</div>
				<div id="clock-box">
					<span><font color="#666666"><span class="ai" >朋友</span>，我等你已经是</font></span>
					<div id="clock"></div>
				</div>
				<canvas id="canvas"></canvas>
			</div>
		</div>
		<script>
			(function() {
				var canvas = $('#canvas');
				if (!canvas[0].getContext) {
					$("#error").show();
					return false;
				}
				// 自适应屏幕尺寸
				var updateCanvasSize = function() {
					var container = $('#wrap');
					var width = container.width();
					var height = container.height();
					canvas.attr("width", width);
					canvas.attr("height", height);
					return { width: width, height: height };
				};
				var size = updateCanvasSize();
				var width = size.width;
				var height = size.height;
				
				// 监听窗口大小变化
				$(window).on('resize', function() {
					var newSize = updateCanvasSize();
					width = newSize.width;
					height = newSize.height;
					// 重新计算参数并初始化树
					opts = getOpts(width, height);
					tree = new Tree(canvas[0], width, height, opts);
				});
				// 根据屏幕尺寸计算参数
				var getOpts = function(w, h) {
					// 判断是否为纵向显示
					var isPortrait = w < h;
					
					// 计算缩放比例 - 纵向和横向使用不同的比例
					var scaleX, scaleY, scale;
					if (isPortrait) {
						// 纵向显示，调整缩放比例，让树更适合小屏幕
						scaleX = w / 1100;
						scaleY = h / 680;
						scale = Math.min(scaleX, scaleY) * 0.8; // 缩小一些，确保完整显示
					} else {
						// 横向显示
						scaleX = w / 1100;
						scaleY = h / 680;
						scale = Math.min(scaleX, scaleY);
					}
					
					// 调整树的位置，纵向时将树放在下方
					var baseX, baseY;
					if (isPortrait) {
						baseX = w / 2;
						baseY = h * 0.8; // 树底部在80%高度位置，留出更多空间
					} else {
						baseX = w / 2;
						baseY = h * 0.85;
					}
					
					// 调整树的高度，确保在纵向屏幕上完整显示
					var treeHeight = isPortrait ? h * 0.5 : 400 * scale;
					
					return {
						seed: {
							x: baseX - 20 * scale,
							color: "rgb(190, 26, 37)",
							scale: 2 * scale
						},
						branch: [
							[baseX - 30 * scale, baseY, baseX + 5 * scale, baseY - treeHeight * 0.8, baseX - 60 * scale, baseY - treeHeight * 0.9, 30 * scale, 100 * scale, [
								[baseX - 25 * scale, baseY - treeHeight * 0.35, baseX - 110 * scale, baseY - treeHeight * 0.5, baseX - 225 * scale, baseY - treeHeight * 0.55, 13 * scale, 100 * scale, [
									[baseX - 115 * scale, baseY - treeHeight * 0.45, baseX - 131 * scale, baseY - treeHeight * 0.48, baseX - 171 * scale, baseY - treeHeight * 0.55, 2 * scale, 40 * scale]
								]],
								[baseX - 15 * scale, baseY - treeHeight * 0.45, baseX + 35 * scale, baseY - treeHeight * 0.65, baseX + 115 * scale, baseY - treeHeight * 0.65, 12 * scale, 100 * scale, [
									[baseX + 13 * scale, baseY - treeHeight * 0.55, baseX + 83 * scale, baseY - treeHeight * 0.52, baseX + 96 * scale, baseY - treeHeight * 0.48, 3 * scale, 80 * scale]
								]],
								[baseX - 26 * scale, baseY - treeHeight * 0.78, baseX - 28 * scale, baseY - treeHeight * 0.85, baseX - 31 * scale, baseY - treeHeight * 0.9, 3 * scale, 40 * scale],
								[baseX - 19 * scale, baseY - treeHeight * 0.55, baseX - 152 * scale, baseY - treeHeight * 0.85, baseX - 237 * scale, baseY - treeHeight * 0.85, 9 * scale, 80 * scale, [
									[baseX - 138 * scale, baseY - treeHeight * 0.75, baseX - 182 * scale, baseY - treeHeight * 0.82, baseX - 194 * scale, baseY - treeHeight * 0.9, 2 * scale, 40 * scale],
									[baseX - 67 * scale, baseY - treeHeight * 0.65, baseX - 130 * scale, baseY - treeHeight * 0.7, baseX - 170 * scale, baseY - treeHeight * 0.68, 4 * scale, 60 * scale]
								]],
								[baseX - 19 * scale, baseY - treeHeight * 0.62, baseX + 43 * scale, baseY - treeHeight * 0.83, baseX + 113 * scale, baseY - treeHeight * 0.88, 6 * scale, 100 * scale, [
									[baseX + 25 * scale, baseY - treeHeight * 0.75, baseX + 81 * scale, baseY - treeHeight * 0.78, baseX + 83 * scale, baseY - treeHeight * 0.8, 2 * scale, 80 * scale]
								]]
							]]
						],
						bloom: {
							num: Math.floor(700 * scale),
							width: w,
							height: h,
						},
						footer: {
							width: w * 1.1,
							height: 5 * scale,
							speed: 10 * scale,
						}
					};
				};
				var opts = getOpts(width, height);

				// 判断是否为移动设备
				// 1. 屏幕宽度小于1024px（覆盖大屏手机横向）
				// 2. 检测触摸事件支持
				var isMobile = width < 1024 || ('ontouchstart' in window);
				
				if (isMobile) {
					// 移动设备：显示樱花雨
					var tree = new Tree(canvas[0], width, height, opts);
					
					// 立即开始樱花雨效果
					var rainAnimate = eval(Jscex.compile("async", function() {
						var ctx = tree.ctx;
						// 初始化大量樱花
						for (var i = 0; i < 30; i++) {
							tree.addBloom(tree.createSakura(width, height));
							$await(Jscex.Async.sleep(30));
						}
						// 持续生成和显示樱花雨
						while (true) {
							tree.ctx.clearRect(0, 0, width, height);
							// 绘制并更新樱花
							for (var i = tree.blooms.length - 1; i >= 0; i--) {
								var sakura = tree.blooms[i];
								if (sakura.jump) {
									sakura.jump();
								}
							}
							// 持续添加新樱花
							if (tree.blooms.length < 80) {
								tree.addBloom(tree.createSakura(width, height));
							}
							$await(Jscex.Async.sleep(20));
						}
					}));
					
					// 文本动画
					var textAnimate = eval(Jscex.compile("async", function() {
						var together = new Date();
						together.setFullYear(2026, (4 - 1), (18 - 1));
						together.setHours(9);
						together.setMinutes(00);
						together.setSeconds(0);
						together.setMilliseconds(0);
						$("#code").show().typewriter();
						$("#clock-box").fadeIn(500);
						while (true) {
							timeElapse(together);
							$await(Jscex.Async.sleep(1000));
						}
					}));
					
					// 启动动画
					rainAnimate().start();
					textAnimate().start();
				} else {
					// 横向和PC端：保持原有效果
					var tree = new Tree(canvas[0], width, height, opts);
					var seed = tree.seed;
					var foot = tree.footer;
					var hold = 1;

					// 点击事件处理
					var handleClick = function(e) {
						var offset = canvas.offset(),
							x, y;
							// 处理触摸事件
							if (e.type === 'touchstart') {
								x = e.originalEvent.touches[0].pageX - offset.left;
								y = e.originalEvent.touches[0].pageY - offset.top;
							} else {
								x = e.pageX - offset.left;
								y = e.pageY - offset.top;
							}
							if (seed.hover(x, y)) {
								hold = 0;
								canvas.unbind("click");
								canvas.unbind("mousemove");
								canvas.unbind("touchstart");
								canvas.removeClass('hand');
							}
					};
					
					// 鼠标移动事件处理
					var handleMouseMove = function(e) {
						var offset = canvas.offset(),
							x, y;
							x = e.pageX - offset.left;
							y = e.pageY - offset.top;
							canvas.toggleClass('hand', seed.hover(x, y));
					};
					
					// 绑定事件
					canvas.click(handleClick);
					canvas.mousemove(handleMouseMove);
					canvas.on('touchstart', handleClick);

					var seedAnimate = eval(Jscex.compile("async", function() {
						seed.draw();
						while (hold) {
							$await(Jscex.Async.sleep(10));
						}
						while (seed.canScale()) {
							seed.scale(0.95);
							$await(Jscex.Async.sleep(10));
						}
						while (seed.canMove()) {
							seed.move(0, 2);
							foot.draw();
							$await(Jscex.Async.sleep(10));
						}
					}));
					var growAnimate = eval(Jscex.compile("async", function() {
						do {
							tree.grow();
							$await(Jscex.Async.sleep(10));
						}
						while (tree.canGrow());
					}));
					var flowAnimate = eval(Jscex.compile("async", function() {
						do {
							tree.flower(2);
							$await(Jscex.Async.sleep(10));
						}
						while (tree.canFlower());
					}));
					var moveAnimate = eval(Jscex.compile("async", function() {
						tree.snapshot("p1", 240, 0, 610, 680);
						while (tree.move("p1", 500, 0)) {
							foot.draw();
							$await(Jscex.Async.sleep(10));
						}
						foot.draw();
						tree.snapshot("p2", 500, 0, 610, 680);
						canvas.parent().css("background", "url(" + tree.toDataURL('image/png') + ")");
						canvas.css("background", "#ffe");
						$await(Jscex.Async.sleep(300));
						canvas.css("background", "none");
					}));
					var jumpAnimate = eval(Jscex.compile("async", function() {
						var ctx = tree.ctx;
						while (true) {
							tree.ctx.clearRect(0, 0, width, height);
							tree.jump();
							foot.draw();
							$await(Jscex.Async.sleep(25));
						}
					}));
					var textAnimate = eval(Jscex.compile("async", function() {
						var together = new Date();
						together.setFullYear(2020, (9 - 1), (2 - 1));
						together.setHours(9);
						together.setMinutes(00);
						together.setSeconds(0);
						together.setMilliseconds(0);
						$("#code").show().typewriter();
						$("#clock-box").fadeIn(500);
						while (true) {
							timeElapse(together);
							$await(Jscex.Async.sleep(1000));
						}
					}));
					var runAsync = eval(Jscex.compile("async", function() {
						$await(seedAnimate());
						$await(growAnimate());
						$await(flowAnimate());
						$await(moveAnimate());
						textAnimate().start();
						$await(jumpAnimate());
					}));
					runAsync().start();
				}
			})();
		</script>
	</body>

</html>
